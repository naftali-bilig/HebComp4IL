<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Need-Me Embed</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #f5f7f8;
    }

    .need-me-frame {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 520px;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <iframe id="needMeFrame" class="need-me-frame" title="Need-Me"></iframe>

  <script>
    (function () {
      "use strict";

      var params = new URLSearchParams(window.location.search);
      params.set("embedded", "1");

      var lang = params.get("lang") || "";
      document.documentElement.lang = lang.toLowerCase().indexOf("en") === 0 ? "en" : "he";
      document.documentElement.dir = document.documentElement.lang === "he" ? "rtl" : "ltr";

      document.getElementById("needMeFrame").src = "index.html?" + params.toString() + window.location.hash;
    }());
  </script>
</body>
</html>
