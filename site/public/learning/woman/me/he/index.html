    var directDefaultLearningKey = "jclockDirectDefaultLearning:" + window.location.pathname;

    function markDirectDefaultLearningRequest(url)
    {
        if (!url.search)
            sessionStorage.setItem(directDefaultLearningKey, "1");
    }

    function shouldSetDefaultHebrewDateParams(url)
    {
        return !url.search ||
            sessionStorage.getItem(directDefaultLearningKey) === "1" ||
            (
                url.searchParams.get("longitude") &&
                url.searchParams.get("latitude") &&
                !url.searchParams.get("period") &&
                !url.searchParams.get("hebrewDay") &&
                !url.searchParams.get("hebrewHour")
            );
    }

    function clearDirectDefaultLearningRequest()
    {
        sessionStorage.removeItem(directDefaultLearningKey);
    }

    //---get Location and activate the clock---
    function getLocation()
    {

        var defaultLongitude = "35.2331664";
        var defaultLatitude = "31.7768514";
        var defaultUrl = new URL(document.location.href);
        markDirectDefaultLearningRequest(defaultUrl);
        if (defaultUrl.searchParams.get("longitude") !== defaultLongitude || defaultUrl.searchParams.get("latitude") !== defaultLatitude)
        {
            defaultUrl.searchParams.set("longitude", defaultLongitude);
            defaultUrl.searchParams.set("latitude", defaultLatitude);

    function getDefaultMoonLearningPeriod()
    {
        var defaultHebrewHour = lbHour + 1;
        if (defaultHebrewHour > 24)
            defaultHebrewHour = defaultHebrewHour - 24;

        if (defaultHebrewHour <= 6)
            return "Jubilee";
        if (defaultHebrewHour <= 12)
            return "Dovid";
        if (defaultHebrewHour <= 18)
            return "Month";
        return "Year";
    }

    function redirectToCurrentLearningShortcut(learningMethod)
    {
        var url = new URL(document.location.href);
        if (url.searchParams.get("shortcut") !== "now")
            return false;

        var shortcutNames = {
            Dovid: "חצות",
            Month: "בוקר",
            Year: "צהריים",
            Jubilee: "ערב"
        };
        window.location.replace("/woman/" + shortcutNames[learningMethod]);
        return true;
    }

    function setDefaultHebrewDateParams(url)
    {
        if (url.searchParams.get("hebrewDay") && url.searchParams.get("hebrewHour"))
        {
            clearDirectDefaultLearningRequest();
            return false;
        }

        if (!shouldSetDefaultHebrewDateParams(url))
            return false;

        var date = new Date();
        var defaultHebrewDay = date.getDay() + 1;
        var h = date.getHours();
        var m = date.getMinutes();
        var s = date.getSeconds();

        if ((h == sunsetH && m == sunsetM && s >= sunsetS) ||
            (h == sunsetH && m > sunsetM) ||
            (h > sunsetH))
            if ((h == 23 && m == 23 && s <= 59) ||
                (h == 23 && m < 59) ||
                (h < 23))
                defaultHebrewDay = defaultHebrewDay + 1;

        if (defaultHebrewDay == 8)
            defaultHebrewDay = 1;

        var defaultHebrewHour = lbHour + 1;
        if (defaultHebrewHour > 24)
            defaultHebrewHour = defaultHebrewHour - 24;

        clearDirectDefaultLearningRequest();
        var learningMethod = getDefaultMoonLearningPeriod();
        if (!redirectToCurrentLearningShortcut(learningMethod))
            sederLimud(learningMethod);
        return true;
    }

    function bindLearningLinkGestures(elementId, openInSefaria, openInApp)
    {
        var element = document.getElementById(elementId);
        var clickTimer;
        var longPressTimer;
        var longPressTriggered = false;

        element.addEventListener('click', function(event) {
            if (longPressTriggered) {
                longPressTriggered = false;
                return;
            }
            if (event.detail > 1)
                return;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(openInSefaria, 250);
        });

        element.addEventListener('dblclick', function(event) {
            event.preventDefault();
            clearTimeout(clickTimer);
            clearTimeout(longPressTimer);
            openInApp();
        });

        element.addEventListener('pointerdown', function(event) {
            if (event.button !== 0)
                return;
            longPressTriggered = false;
            clearTimeout(longPressTimer);
            longPressTimer = setTimeout(function() {
                clearTimeout(clickTimer);
                longPressTriggered = true;
                openInApp();
            }, 600);
        });

        ['pointerup', 'pointercancel', 'pointerleave'].forEach(function(eventName) {
            element.addEventListener(eventName, function() {
                clearTimeout(longPressTimer);
            });
        });

        element.addEventListener('contextmenu', function(event) {
            if (longPressTriggered)
                event.preventDefault();
        });
    }
