<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>יום-טיוב</title>
  <link rel="stylesheet" href="../player.css">
  <script src="../player.js" defer></script>
  <script src="../library.js" defer></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; padding: 24px; color: #f7f7f7; background: radial-gradient(circle at top, #272727, #0b0b0b 56%); font-family: Arial, sans-serif; }
    main { width: min(780px, 100%); margin: auto; }
    header { margin-bottom: 22px; text-align: center; }
    h1 { margin: 0; color: #fff; font-size: clamp(2rem, 8vw, 3.8rem); }
    h1 span { color: #e62117; }
    header p { color: #c9c9c9; line-height: 1.6; }
    article { padding: 20px; border: 1px solid #353535; border-radius: 20px; background: #171717; box-shadow: 0 20px 50px rgba(0,0,0,.35); }
    h2 { margin: 0 0 14px; font-size: 1.25rem; }
    .library-status { margin: 18px 0 8px; color: #bdbdbd; font-size: .92rem; }
    .library { display: flex; flex-wrap: wrap; gap: 8px; }
    .library button { border: 1px solid #444; border-radius: 999px; padding: 8px 13px; color: #fff; background: #262626; font: inherit; cursor: pointer; }
    .library button[aria-pressed="true"] { border-color: #e62117; background: #3a1614; }
    footer { margin-top: 22px; text-align: center; }
    a { color: #fff; font-weight: 700; }
    @media (max-width: 520px) { body { padding: 12px; } article { padding: 14px; } }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>יום<span>-</span>טיוב</h1>
      <p>הבית הקבוע לסרטוני האפליקציה — נגן מקומי ללא המלצות, פרסומות או קישורים לתוכן חיצוני.</p>
    </header>
    <article>
      <h2 data-youmtove-title>סרטון הסבר על מעשרות</h2>
      <div data-youmtove data-title="סרטון הסבר על מעשרות">
        <video controls preload="metadata" playsinline disablepictureinpicture controlslist="nodownload noremoteplayback" aria-label="סרטון הסבר על מעשרות">
          <source src="../media/How_the_Hebrew_Clock_Divides_an_Hour.mp4" type="video/mp4">
          הדפדפן אינו תומך בניגון הסרטון.
        </video>
      </div>
      <p class="library-status" data-youmtove-status>טוען את ספריית TuningLimud…</p>
      <div class="library" data-youmtove-library aria-label="ספריית הסרטונים"></div>
    </article>
    <footer><a href="/jclock/index.html">חזרה לשעון ירושלים</a></footer>
  </main>
</body>
</html>
